<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body { margin: 0; font-family: sans-serif; background: #f8f9fa; }
      video {
        width: 100%;
        height: auto;
        object-fit: contain;
        background: #111;
        border-radius: 8px;
        display: block;
      }
      .controls { display: flex; gap: 8px; margin-top: 8px; }
      button { padding: 8px 12px; border: 0; border-radius: 6px; cursor: pointer; }
      .start { background: #0a7; color: #fff; }
      .stop { background: #c33; color: #fff; }
      .status { margin-top: 6px; font-size: 12px; color: #444; }
    </style>
  </head>
  <body>
    <video id="preview" autoplay playsinline muted></video>
    <div class="controls">
      <button class="start" id="startBtn">Iniciar gravação</button>
      <button class="stop" id="stopBtn" disabled>Parar gravação</button>
    </div>
    <div class="status" id="status">Aguardando câmera…</div>

    <script>
      const video = document.getElementById("preview")
      const startBtn = document.getElementById("startBtn")
      const stopBtn = document.getElementById("stopBtn")
      const statusEl = document.getElementById("status")

      let stream = null
      let recorder = null
      let chunks = []

      function post(type, payload = {}) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...payload }, "*")
      }
      function setReady() { post("streamlit:componentReady", { apiVersion: 1 }) }
      function setHeight(h) { post("streamlit:setFrameHeight", { height: h }) }
      function setValue(v) { post("streamlit:setComponentValue", { value: v }) }
      function updateFrameHeight() {
        const ratio = video.videoWidth && video.videoHeight ? (video.videoHeight / video.videoWidth) : (9 / 16)
        const videoHeight = Math.max(280, Math.floor(video.clientWidth * ratio))
        setHeight(videoHeight + 120)
      }

      async function ensureStream() {
        if (stream) return
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true })
        video.srcObject = stream
        statusEl.textContent = "Câmera pronta"
        updateFrameHeight()
      }

      async function startRecord() {
        await ensureStream()
        chunks = []
        recorder = new MediaRecorder(stream, { mimeType: "video/webm" })
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data) }
        recorder.onstop = async () => {
          const blob = new Blob(chunks, { type: "video/webm" })
          const buf = await blob.arrayBuffer()
          const bytes = btoa(String.fromCharCode(...new Uint8Array(buf)))
          setValue({
            mime_type: "video/webm",
            data_base64: bytes,
            timestamp: Date.now(),
          })
          statusEl.textContent = `Gravação finalizada (${Math.round(blob.size / 1024)} KB)`
          startBtn.disabled = false
          stopBtn.disabled = true
        }
        recorder.start()
        statusEl.textContent = "Gravando..."
        startBtn.disabled = true
        stopBtn.disabled = false
      }

      function stopRecord() {
        if (recorder && recorder.state === "recording") recorder.stop()
      }

      startBtn.addEventListener("click", startRecord)
      stopBtn.addEventListener("click", stopRecord)
      video.addEventListener("loadedmetadata", updateFrameHeight)
      window.addEventListener("resize", updateFrameHeight)

      setReady()
      setHeight(520)
      ensureStream().catch((e) => { statusEl.textContent = `Erro câmera: ${e.message || e}` })
    </script>
  </body>
</html>
