<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Click Snapshot</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f8f9fa;
      }
      .wrapper {
        position: relative;
        width: 100%;
      }
      video {
        width: 100%;
        border-radius: 10px;
        background: #111;
        display: block;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }
      .badge {
        position: absolute;
        right: 8px;
        top: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        font-size: 11px;
        border-radius: 999px;
        padding: 4px 8px;
      }
      .error {
        margin-top: 8px;
        color: #a00;
        font-size: 12px;
      }
      canvas {
        display: none;
      }
    </style>
    <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/index.js"></script>
  </head>
  <body>
    <div class="wrapper">
      <video id="preview" autoplay playsinline muted></video>
      <div class="badge">Clique no frame para capturar</div>
    </div>
    <div class="hint">Ao clicar no vídeo, o snapshot é enviado ao Streamlit.</div>
    <div id="error" class="error" hidden></div>
    <canvas id="canvas"></canvas>

    <script>
      const Streamlit = window.Streamlit
      const video = document.getElementById("preview")
      const canvas = document.getElementById("canvas")
      const errorEl = document.getElementById("error")

      let stream = null
      let imageFormat = "image/jpeg"
      let imageQuality = 0.92
      let requestedWidth = 960
      let requestedHeight = 540

      function updateHeight() {
        const videoHeight = video.videoHeight || requestedHeight
        const ratio = requestedHeight / requestedWidth
        const fallbackHeight = Math.floor(video.clientWidth * ratio)
        const height = Math.max(videoHeight, fallbackHeight, 260)
        Streamlit.setFrameHeight(height + 52)
      }

      function setError(message) {
        errorEl.hidden = false
        errorEl.textContent = message
      }

      async function ensureStream() {
        if (stream) {
          return
        }
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: requestedWidth },
              height: { ideal: requestedHeight },
            },
            audio: false,
          })
          video.srcObject = stream
          await video.play()
          updateHeight()
        } catch (error) {
          setError(`Não foi possível abrir a câmera: ${error?.message || error}`)
        }
      }

      function capture() {
        if (!video.videoWidth || !video.videoHeight) {
          return
        }
        canvas.width = video.videoWidth
        canvas.height = video.videoHeight
        const ctx = canvas.getContext("2d")
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height)
        const dataUrl = canvas.toDataURL(imageFormat, imageQuality)
        Streamlit.setComponentValue({
          data_url: dataUrl,
          timestamp: Date.now(),
          width: canvas.width,
          height: canvas.height,
          mime_type: imageFormat,
        })
      }

      function onRender(event) {
        const args = event.detail.args || {}
        imageFormat = args.image_format || "image/jpeg"
        imageQuality = args.image_quality ?? 0.92
        requestedWidth = args.width || 960
        requestedHeight = args.height || 540
        ensureStream()
      }

      video.addEventListener("loadedmetadata", updateHeight)
      window.addEventListener("resize", updateHeight)
      video.addEventListener("click", capture)

      Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender)
      Streamlit.setComponentReady()
      Streamlit.setFrameHeight(320)
    </script>
  </body>
</html>
